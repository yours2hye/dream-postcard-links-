<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>꿈엽서그리기대회 업무 링크 모음</title>
<style>
  :root {
    color-scheme: light;
    --bg: #f6f4fb;
    --card: #ffffff;
    --ink: #241f33;
    --sub: #6b6480;
    --accent: #7c5cff;
    --accent-soft: #efe9ff;
    --border: #e7e2f5;
    --shadow: 0 1px 2px rgba(36,31,51,.05), 0 8px 24px rgba(36,31,51,.06);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, "Apple SD Gothic Neo", "Pretendard", "Malgun Gothic", sans-serif;
    background: var(--bg);
    color: var(--ink);
    padding-bottom: 64px;
  }
  header {
    padding: 48px 24px 28px;
    text-align: center;
  }
  header h1 { font-size: 26px; margin: 0 0 6px; }
  header p { margin: 0; color: var(--sub); font-size: 14px; }
  .search-wrap { max-width: 480px; margin: 24px auto 0; padding: 0 24px; }
  #search {
    width: 100%;
    padding: 12px 16px;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: var(--card);
    font-size: 14px;
    outline: none;
  }
  #search:focus { border-color: var(--accent); }
  main { max-width: 1080px; margin: 0 auto; padding: 8px 24px; }
  section.group { margin-top: 36px; }
  .group h2 {
    font-size: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
    margin: 0 0 14px;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 12px;
  }
  .card {
    position: relative;
    display: block;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px;
    box-shadow: var(--shadow);
    transition: transform .12s ease, border-color .12s ease;
  }
  .card:hover { transform: translateY(-2px); border-color: var(--accent); }
  .card .card-link { position: absolute; inset: 0; border-radius: inherit; }
  .card .title { font-size: 14.5px; font-weight: 600; line-height: 1.4; }
  .card .subtitle { font-size: 12.5px; color: var(--sub); margin-top: 4px; }
  .card .extra {
    position: relative;
    z-index: 1;
    display: inline-block;
    margin-top: 10px;
    font-size: 11.5px;
    color: var(--accent);
    background: var(--accent-soft);
    padding: 3px 8px;
    border-radius: 999px;
    text-decoration: none;
  }
  #favorites .grid .card { border-color: #f0c419; background: #fffbea; }
  footer {
    text-align: center;
    color: var(--sub);
    font-size: 12px;
    margin-top: 56px;
  }
  .empty, .error { text-align: center; color: var(--sub); padding: 60px 0; font-size: 14px; }
  .error { color: #c0392b; }
</style>
</head>
<body>
<header>
  <h1>꿈엽서그리기대회의 모든것😎</h1>
  <p>쉿. 꿈엽서파트만 들어오세요</p>
  <div class="search-wrap">
    <input id="search" type="text" placeholder="자료명 검색 (예: 예산, 대시보드, 어드민...)">
  </div>
</header>
<main id="main">
  <div class="empty">불러오는 중...</div>
</main>
<footer id="footer"></footer>

<script>
async function init() {
  const main = document.getElementById('main');
  let data;
  try {
    const res = await fetch('/api/links');
    if (!res.ok) throw new Error('status ' + res.status);
    data = await res.json();
  } catch (e) {
    main.innerHTML = '<div class="error">데이터를 불러오지 못했습니다. 잠시 후 새로고침 해주세요.</div>';
    return;
  }

  function cardHTML(item) {
    const sub = item.subtitle ? `<div class="subtitle">${escapeHTML(item.subtitle)}</div>` : '';
    const extra = item.extra ? `<a class="extra" href="${item.extra.url}" target="_blank" rel="noopener">${escapeHTML(item.extra.label)}</a>` : '';
    const titleText = item.icon ? `${item.icon} ${escapeHTML(item.title)}` : escapeHTML(item.title);
    return `<div class="card" data-search="${escapeHTML((item.title + ' ' + (item.subtitle||'')).toLowerCase())}">
      <a class="card-link" href="${item.url}" target="_blank" rel="noopener" aria-label="${escapeHTML(item.title)}"></a>
      <div class="title">${titleText}</div>
      ${sub}
      ${extra}
    </div>`;
  }

  function escapeHTML(s) {
    return String(s).replace(/[&<>"']/g, (c) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  let html = '';
  if (data.favorites && data.favorites.length) {
    html += `<section class="group" id="favorites"><h2>⭐ 자주 쓰는 자료 바로가기</h2><div class="grid">${data.favorites.map(cardHTML).join('')}</div></section>`;
  }
  for (const section of data.sections) {
    html += `<section class="group" data-section><h2>${section.icon} ${escapeHTML(section.label)}</h2><div class="grid">${section.items.map(cardHTML).join('')}</div></section>`;
  }
  main.innerHTML = html || '<div class="empty">표시할 자료가 없습니다.</div>';

  const footer = document.getElementById('footer');
  const updated = new Date(data.updatedAt);
  footer.textContent = `업데이트: ${updated.getFullYear()}.${String(updated.getMonth()+1).padStart(2,'0')}.${String(updated.getDate()).padStart(2,'0')} ${String(updated.getHours()).padStart(2,'0')}:${String(updated.getMinutes()).padStart(2,'0')} · 원본 시트에서 자동 연동됨`;

  document.getElementById('search').addEventListener('input', (e) => {
    const q = e.target.value.trim().toLowerCase();
    document.querySelectorAll('[data-section], #favorites').forEach((section) => {
      let visible = 0;
      section.querySelectorAll('.card').forEach((card) => {
        const match = !q || card.dataset.search.includes(q);
        card.style.display = match ? '' : 'none';
        if (match) visible++;
      });
      section.style.display = visible ? '' : 'none';
    });
  });
}
init();
</script>
</body>
</html>
