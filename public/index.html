<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>꿈엽서그리기대회 업무 링크 모음</title>
<link rel="icon" href="/logo.png">
<style>
  :root {
    color-scheme: light;
    --grad-start: #e8531c;
    --grad-end: #ffab5e;
    --bg: #fffaf5;
    --card: #ffffff;
    --ink: #2c2015;
    --sub: #8a7968;
    --accent: #e8531c;
    --accent-soft: #fff1e4;
    --border: #f4e2d0;
    --shadow: 0 1px 2px rgba(60,30,10,.05), 0 10px 24px rgba(60,30,10,.07);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, "Apple SD Gothic Neo", "Pretendard", "Malgun Gothic", sans-serif;
    background: var(--bg);
    color: var(--ink);
    padding-bottom: 64px;
  }
  header {
    background: linear-gradient(135deg, var(--grad-start), var(--grad-end));
    padding: 44px 24px 64px;
    text-align: center;
  }
  header img.logo {
    width: min(260px, 60vw);
    filter: drop-shadow(0 6px 14px rgba(0,0,0,.15));
    margin-bottom: 18px;
  }
  header h1 { color: #fff; font-size: 26px; margin: 0 0 6px; }
  header p { margin: 0; color: rgba(255,255,255,.88); font-size: 14px; }
  .search-wrap { max-width: 480px; margin: -26px auto 0; padding: 0 24px; position: relative; z-index: 2; }
  #search {
    width: 100%;
    padding: 14px 18px;
    border-radius: 14px;
    border: 1px solid var(--border);
    background: var(--card);
    font-size: 14px;
    outline: none;
    box-shadow: var(--shadow);
  }
  #search:focus { border-color: var(--accent); }
  main { max-width: 1080px; margin: 0 auto; padding: 40px 24px 8px; }
  section.group { margin-top: 40px; }
  .group h2 {
    font-size: 15.5px;
    font-weight: 700;
    color: var(--accent);
    display: flex;
    align-items: center;
    gap: 8px;
    margin: 0 0 16px;
    padding-left: 12px;
    border-left: 4px solid var(--accent);
  }

  /* favorites: colorful icon tiles */
  .fav-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 12px;
  }
  .fav-card {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    gap: 4px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 22px 12px 18px;
    box-shadow: var(--shadow);
    transition: transform .12s ease, border-color .12s ease;
  }
  .fav-card:hover { transform: translateY(-3px); border-color: var(--accent); }
  .fav-card .card-link { position: absolute; inset: 0; border-radius: inherit; }
  .fav-card .icon-badge {
    width: 52px;
    height: 52px;
    border-radius: 16px;
    background: var(--accent-soft);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 26px;
    margin-bottom: 6px;
  }
  .fav-card .title { font-size: 13.5px; font-weight: 700; line-height: 1.35; }
  .fav-card .subtitle { font-size: 11.5px; color: var(--sub); margin-top: 2px; }
  .fav-card .extra {
    position: relative;
    z-index: 1;
    display: inline-block;
    margin-top: 8px;
    font-size: 10.5px;
    color: var(--accent);
    background: var(--accent-soft);
    padding: 3px 8px;
    border-radius: 999px;
    text-decoration: none;
  }

  /* regular sections: flat list rows grouped in a card */
  .list-box {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    box-shadow: var(--shadow);
    overflow: hidden;
  }
  .list-row {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
  }
  .list-row:last-child { border-bottom: none; }
  .list-row:hover { background: var(--accent-soft); }
  .list-row .row-link { position: absolute; inset: 0; }
  .list-row .row-text { position: relative; min-width: 0; }
  .list-row .title { font-size: 14px; font-weight: 600; line-height: 1.4; }
  .list-row .subtitle { font-size: 12px; color: var(--sub); margin-top: 2px; }
  .list-row .row-right { position: relative; z-index: 1; display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
  .list-row .extra {
    font-size: 11px;
    color: var(--accent);
    background: var(--accent-soft);
    padding: 3px 8px;
    border-radius: 999px;
    text-decoration: none;
    white-space: nowrap;
  }
  .list-row .arrow { color: var(--sub); transition: transform .12s ease, color .12s ease; }
  .list-row:hover .arrow { color: var(--accent); transform: translateX(3px); }

  footer {
    text-align: center;
    color: var(--sub);
    font-size: 12px;
    margin-top: 56px;
  }
  .empty, .error { text-align: center; color: var(--sub); padding: 60px 0; font-size: 14px; }
  .error { color: #c0392b; }
</style>
</head>
<body>
<header>
  <img class="logo" src="/logo.png" alt="꿈엽서그리기대회 월드비전 로고">
  <h1>꿈엽서그리기대회의 모든것😎</h1>
  <p>쉿. 꿈엽서파트만 들어오세요</p>
</header>
<div class="search-wrap">
  <input id="search" type="text" placeholder="자료명 검색 (예: 예산, 대시보드, 어드민...)">
</div>
<main id="main">
  <div class="empty">불러오는 중...</div>
</main>
<footer id="footer"></footer>

<script>
async function init() {
  const main = document.getElementById('main');
  let data;
  try {
    const res = await fetch('/api/links');
    if (!res.ok) throw new Error('status ' + res.status);
    data = await res.json();
  } catch (e) {
    main.innerHTML = '<div class="error">데이터를 불러오지 못했습니다. 잠시 후 새로고침 해주세요.</div>';
    return;
  }

  function escapeHTML(s) {
    return String(s).replace(/[&<>"']/g, (c) => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  function searchKey(item) {
    return escapeHTML((item.title + ' ' + (item.subtitle || '')).toLowerCase());
  }

  function favCardHTML(item, sectionIcon) {
    const sub = item.subtitle ? `<div class="subtitle">${escapeHTML(item.subtitle)}</div>` : '';
    const extra = item.extra ? `<a class="extra" href="${item.extra.url}" target="_blank" rel="noopener">${escapeHTML(item.extra.label)}</a>` : '';
    const icon = item.icon || sectionIcon || '⭐';
    return `<div class="fav-card" data-search="${searchKey(item)}">
      <a class="card-link" href="${item.url}" target="_blank" rel="noopener" aria-label="${escapeHTML(item.title)}"></a>
      <div class="icon-badge">${icon}</div>
      <div class="title">${escapeHTML(item.title)}</div>
      ${sub}
      ${extra}
    </div>`;
  }

  function rowHTML(item) {
    const sub = item.subtitle ? `<div class="subtitle">${escapeHTML(item.subtitle)}</div>` : '';
    const extra = item.extra ? `<a class="extra" href="${item.extra.url}" target="_blank" rel="noopener">${escapeHTML(item.extra.label)}</a>` : '';
    return `<div class="list-row" data-search="${searchKey(item)}">
      <a class="row-link" href="${item.url}" target="_blank" rel="noopener" aria-label="${escapeHTML(item.title)}"></a>
      <div class="row-text">
        <div class="title">${escapeHTML(item.title)}</div>
        ${sub}
      </div>
      <div class="row-right">
        ${extra}
        <span class="arrow">→</span>
      </div>
    </div>`;
  }

  let html = '';
  if (data.favorites && data.favorites.length) {
    html += `<section class="group" id="favorites"><h2>⭐ 자주 쓰는 자료 바로가기</h2><div class="fav-grid">${data.favorites.map((it) => favCardHTML(it, null)).join('')}</div></section>`;
  }
  for (const section of data.sections) {
    html += `<section class="group" data-section><h2>${section.icon} ${escapeHTML(section.label)}</h2><div class="list-box">${section.items.map(rowHTML).join('')}</div></section>`;
  }
  main.innerHTML = html || '<div class="empty">표시할 자료가 없습니다.</div>';

  const footer = document.getElementById('footer');
  const updated = new Date(data.updatedAt);
  footer.textContent = `업데이트: ${updated.getFullYear()}.${String(updated.getMonth()+1).padStart(2,'0')}.${String(updated.getDate()).padStart(2,'0')} ${String(updated.getHours()).padStart(2,'0')}:${String(updated.getMinutes()).padStart(2,'0')} · 원본 시트에서 자동 연동됨`;

  document.getElementById('search').addEventListener('input', (e) => {
    const q = e.target.value.trim().toLowerCase();
    document.querySelectorAll('[data-section], #favorites').forEach((section) => {
      let visible = 0;
      section.querySelectorAll('[data-search]').forEach((card) => {
        const match = !q || card.dataset.search.includes(q);
        card.style.display = match ? '' : 'none';
        if (match) visible++;
      });
      section.style.display = visible ? '' : 'none';
    });
  });
}
init();
</script>
</body>
</html>
